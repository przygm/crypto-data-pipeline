version: 2

sources:
  - name: raw
    database: CRYPTO_RAW 
    schema: PUBLIC
    tables:
      - name: raw_crypto

models:
  - name: stg_crypto
    description: "Model oczyszczający surowe dane o cenach kryptowalut"
    columns:
      - name: btc_price
        tests:
          - not_null
      - name: eth_price
        tests:
          - not_null
      - name: ingestion_time
        tests:
          - not_null