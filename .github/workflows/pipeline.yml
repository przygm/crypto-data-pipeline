name: Crypto Pipeline

on:
  schedule:
    - cron: '0 * * * *'            # every hour
  workflow_dispatch:               # you can call manually too

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

      # RAW (Python)
      SNOWFLAKE_RAW_DATABASE: CRYPTO_RAW
      SNOWFLAKE_RAW_SCHEMA: PUBLIC      

      # ANALYTICS
      SNOWFLAKE_ANALYTICS_DATABASE: CRYPTO_ANALYTICS
      SNOWFLAKE_ANALYTICS_SCHEMA: DBT_PZYGMUNT

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        run: python ingest_crypto.py

      - name: Create dbt profile
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          crypto_pipeline:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: $SNOWFLAKE_ACCOUNT
                user: $SNOWFLAKE_USER
                password: $SNOWFLAKE_PASSWORD
                role: ACCOUNTADMIN
                database: $SNOWFLAKE_ANALYTICS_DATABASE
                warehouse: $SNOWFLAKE_WAREHOUSE
                schema: $SNOWFLAKE_ANALYTICS_SCHEMA
                threads: 1
          EOF

      - name: Install dbt deps
        run: dbt deps
        
      - name: Run dbt
        run: |
          dbt run
          dbt test          